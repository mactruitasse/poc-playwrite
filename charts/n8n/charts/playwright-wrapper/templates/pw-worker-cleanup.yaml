{{- if .Values.workerCleanup.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pw-worker-cleaner
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pw-worker-cleaner
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get","list","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pw-worker-cleaner
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: pw-worker-cleaner
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: pw-worker-cleaner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pw-worker-cleanup
  namespace: {{ .Release.Namespace }}
spec:
  schedule: {{ .Values.workerCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: pw-worker-cleaner
          restartPolicy: Never
          containers:
            - name: cleanup
              image: {{ .Values.workerCleanup.image | quote }}
              imagePullPolicy: IfNotPresent
              env:
                - name: NAMESPACE
                  value: {{ .Release.Namespace | quote }}
                - name: TTL_MINUTES
                  value: {{ .Values.workerCleanup.ttlMinutes | quote }}
              command: ["/bin/sh","-lc"]
              args:
                - |
                  set -eu
                  apk add --no-cache kubectl >/dev/null
                  python - <<'PY'
                  import json, os, subprocess, time, datetime
                  ns = os.environ.get("NAMESPACE","n8n-prod")
                  ttl = int(os.environ.get("TTL_MINUTES","15")) * 60
                  label = "created-by=playwright-wrapper,app=playwright-worker"
                  j = subprocess.check_output(["kubectl","-n",ns,"get","pods","-l",label,"-o","json"], text=True)
                  data = json.loads(j)
                  now = time.time()
                  victims = []
                  for item in data.get("items",[]):
                    name = item["metadata"]["name"]
                    phase = item.get("status",{}).get("phase","")
                    ts = item["metadata"].get("creationTimestamp")
                    if not ts:
                      continue
                    dt = datetime.datetime.fromisoformat(ts.replace("Z","+00:00"))
                    age = now - dt.timestamp()
                    if age > ttl and phase in ("Running","Pending","Succeeded","Failed","Unknown"):
                      victims.append(name)
                  for name in victims:
                    subprocess.run(["kubectl","-n",ns,"delete","pod",name,"--grace-period=10"], check=False)
                  print(f"deleted={len(victims)} ttl_seconds={ttl}")
                  PY
{{- end }}
