apiVersion: apps/v1
kind: Deployment
metadata:
  name: playwright-wrapper
  namespace: n8n-prod
spec:
  replicas: 1
  selector:
    matchLabels: { app: playwright-wrapper }
  template:
    metadata:
      labels: { app: playwright-wrapper }
    spec:
      containers:
      - name: wrapper
        image: playwright-wrapper:v1
        imagePullPolicy: IfNotPresent
        ports: [{ containerPort: 8080 }]
        env:
        - name: BROWSERLESS_URL
          value: "ws://browserless:3000"
---
apiVersion: v1
kind: Service
metadata:
  name: playwright-wrapper
  namespace: n8n-prod
spec:
  ports: [{ port: 8080, targetPort: 8080 }]
  selector: { app: playwright-wrapper }
