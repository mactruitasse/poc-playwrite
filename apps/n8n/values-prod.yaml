image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

db:
  type: postgresdb

# --- Configuration INGRESS (Accès n8n.localhost) ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: n8n.localhost
      paths:
        - path: /
          pathType: Prefix

postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    existingSecret: n8n-prod-postgresql

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password

# --- CONFIGURATION BROWSERLESS (TIMEOUT 20 MIN) ---
browserless:
  enabled: true
  image:
    repository: browserless/chrome
    tag: latest
  service:
    port: 3000
  env:
    MAX_CONCURRENT_SESSIONS: "10"
    # Temps maximum d'une session : 20 minutes (1200000 ms)
    TIMEOUT: "1200000"
    # Timeout de connexion initial
    CONNECTION_TIMEOUT: "60000"
    # Garder la session active même si le script n8n s'arrête brutalement
    KEEP_ALIVE: "true"

# --- Variables d'environnement partagées ---
commonEnv: &commonEnv
  NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
  NODE_FUNCTION_ALLOW_BUILTIN: "*"
  N8N_COMMUNITY_PACKAGES_ENABLED: "true"
  BROWSERLESS_URL: "http://browserless:3000"
  PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
  
  # Stabilité Task Runner (Désactivé pour éviter les crashs WebSocket internes)
  N8N_TASK_RUNNERS_ENABLED: "false"
  N8N_RUNNERS_MAX_OLD_SPACE_SIZE: "2048"
  # Timeout de n8n pour attendre le runner (2 minutes)
  N8N_TASK_RUNNERS_TIMEOUT: "120000"
  
  N8N_LOG_LEVEL: "debug"
  N8N_SECURE_COOKIE: "false"

# --- LIMITES DE RESSOURCES KUBERNETES ---
resources: &resources
  limits:
    memory: "4Gi"
    cpu: "1000m"
  requests:
    memory: "2Gi"
    cpu: "500m"

main:
  count: 1
  command: ["/usr/local/bin/n8n"]
  extraEnvVars: *commonEnv
  resources: *resources

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"]
  args: ["worker"]
  extraEnvVars: *commonEnv
  resources: *resources

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"]
  url: http://n8n.localhost
  extraEnvVars: *commonEnv
  resources: *resources

# --- Playwright Wrapper (MCP) ---
playwright-wrapper:
  enabled: true
  image:
    repository: n8n-playwright-local
    tag: 2.2.4-pw1.49.0-fix4-20260225-113301-nogit
  service:
    port: 8080
  env:
    apiTokenSecretName: playwright-wrapper-secret
    apiTokenSecretKey: API_TOKEN
    targetNamespace: n8n-prod
  ingress:
    enabled: true

existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2
