image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

db:
  type: postgresdb

# --- Configuration INGRESS GLOBAL ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: n8n.localhost
      paths:
        - path: /
          pathType: Prefix

postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    existingSecret: n8n-prod-postgresql

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password

browserless:
  enabled: true
  image:
    repository: browserless/chrome
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    MAX_CONCURRENT_SESSIONS: "10"

# --- Sondes de Santé ---
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 45
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 3

# --- Variables d'environnement partagées ---
commonEnv: &commonEnv
  N8N_COMMUNITY_PACKAGES_ENABLED: "true"
  N8N_SECURE_COOKIE: "false"
  BROWSERLESS_URL: "http://browserless:3000"
  PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
  NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
  NODE_FUNCTION_ALLOW_BUILTIN: "*"
  # Le processus Node demande 2Go
  N8N_RUNNERS_MAX_OLD_SPACE_SIZE: "2048"

# --- CONFIGURATION DES RESSOURCES (LE FIX) ---
# On s'assure que Kubernetes autorise le pod à consommer plus que Node
resources:
  limits:
    memory: "3Gi"
    cpu: "1000m"
  requests:
    memory: "1Gi"
    cpu: "500m"

main:
  count: 1
  command: ["/usr/local/bin/n8n"]
  extraEnvVars: *commonEnv
  resources:
    limits:
      memory: "3Gi"
    requests:
      memory: "1Gi"

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"]
  args: ["worker"]
  extraEnvVars: *commonEnv
  resources:
    limits:
      memory: "3Gi"
    requests:
      memory: "1Gi"

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"]
  url: http://n8n.localhost
  extraEnvVars: *commonEnv

playwright-wrapper:
  enabled: true
  image:
    repository: n8n-playwright-local
    tag: 2.2.4-pw1.49.0-fix4-20260225-113301-nogit
  service:
    type: ClusterIP
    port: 8080
  env:
    apiTokenSecretName: playwright-wrapper-secret
    apiTokenSecretKey: API_TOKEN
    targetNamespace: n8n-prod
    playwrightPodLabelKey: app
    playwrightPodLabelValue: playwright-worker
    playwrightMcpPort: "8080"
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2
