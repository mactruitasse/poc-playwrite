# Configuration de l'image personnalisée
image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

db:
  type: postgresdb

# --- Configuration INGRESS (Accès n8n.localhost) ---
# Ce bloc règle l'erreur 404 Nginx de ta première image
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: n8n.localhost
      paths:
        - path: /
          pathType: Prefix

# --- Base de données et Cache ---
postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    existingSecret: n8n-prod-postgresql

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password

# --- Browserless (Moteur de rendu Chrome) ---
browserless:
  enabled: true
  image:
    repository: browserless/chrome
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    MAX_CONCURRENT_SESSIONS: "10"

# --- Sondes de Santé ---
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 45
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 3

# --- VARIABLES D'ENVIRONNEMENT PARTAGÉES (LE FIX MÉMOIRE) ---
commonEnv: &commonEnv
  N8N_COMMUNITY_PACKAGES_ENABLED: "true"
  N8N_SECURE_COOKIE: "false"
  BROWSERLESS_URL: "http://browserless:3000"
  PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
  # Autorisations pour le nœud Code
  NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
  NODE_FUNCTION_ALLOW_BUILTIN: "*"
  # CORRECTIF MÉMOIRE : Alloue 1 Go à l'exécuteur pour éviter le crash
  N8N_RUNNERS_MAX_OLD_SPACE_SIZE: "1024"

# Application des variables aux différents composants
main:
  count: 1
  command: ["/usr/local/bin/n8n"]
  extraEnvVars: *commonEnv

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"]
  args: ["worker"]
  extraEnvVars: *commonEnv

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"]
  url: http://n8n.localhost
  extraEnvVars: *commonEnv

# --- Playwright Wrapper ---
playwright-wrapper:
  enabled: true
  image:
    repository: n8n-playwright-local
    tag: 2.2.4-pw1.49.0-fix4-20260225-113301-nogit
  service:
    type: ClusterIP
    port: 8080
  env:
    apiTokenSecretName: playwright-wrapper-secret
    apiTokenSecretKey: API_TOKEN
    targetNamespace: n8n-prod
    playwrightPodLabelKey: app
    playwrightPodLabelValue: playwright-worker
    playwrightMcpPort: "8080"
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2
