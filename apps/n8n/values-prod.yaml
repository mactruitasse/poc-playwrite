image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

db:
  type: postgresdb

postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    existingSecret: n8n-prod-postgresql

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password

# --- Correction des Sondes (Port 8080 d'après tes logs Flask) ---
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 45
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 3

main:
  count: 1
  command: ["/usr/local/bin/n8n"] # Chemin absolu pour éviter le "not found"
  extraEnvVars:
    N8N_COMMUNITY_PACKAGES_ENABLED: "true"
    N8N_SECURE_COOKIE: "false"

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"] # Chemin absolu
  args: ["worker"]

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"] # Chemin absolu
  url: http://n8n.localhost

playwright-wrapper:
  enabled: true
  image:
    repository: n8n-playwright-local
    tag: 2.2.4-pw1.49.0-fix4-20260225-113301-nogit
  service:
    type: ClusterIP
    port: 8080 # Port réel de Flask
  env:
    apiTokenSecretName: playwright-wrapper-secret
    apiTokenSecretKey: API_TOKEN
    targetNamespace: n8n-prod
    playwrightPodLabelKey: app
    playwrightPodLabelValue: playwright-worker
    playwrightMcpPort: "8080" # Alignement
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2
