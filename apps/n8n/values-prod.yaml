image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix4

db:
  [cite_start]type: postgresdb # [cite: 50]

postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    [cite_start]existingSecret: n8n-prod-postgresql # [cite: 50]

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    [cite_start]password: redis-local-password # [cite: 50]

# Probes globales ajustées pour Playwright
livenessProbe:
  httpGet:
    path: /health
    port: 8933
  [cite_start]initialDelaySeconds: 45 # Laisse le temps au navigateur de démarrer [cite: 50]
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: 8933
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 3

main:
  count: 1
  extraEnvVars:
    N8N_COMMUNITY_PACKAGES_ENABLED: "true"
    [cite_start]N8N_SECURE_COOKIE: "false" # [cite: 54]

worker:
  mode: queue
  count: 1
  [cite_start]concurrency: 5 # [cite: 54, 58]

webhook:
  mode: queue
  count: 1
  [cite_start]url: http://n8n.localhost # [cite: 58, 62]

playwright-wrapper:
  enabled: true
  image:
    repository: n8n-playwright-local
    tag: 2.2.4-pw1.49.0-fix4-20260225-113301-nogit
  service:
    type: ClusterIP
    [cite_start]port: 8080 # [cite: 62]
  env:
    playwrightMcpPort: "8933"
    [cite_start]playwrightPodLabelValue: playwright-worker # [cite: 63]
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffering: "off" # Crucial pour MCP
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

[cite_start]existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2 # [cite: 64]
