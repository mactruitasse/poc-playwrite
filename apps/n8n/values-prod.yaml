image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5678

# --- Configuration Ingress (Crucial pour n8n.localhost) ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: n8n.localhost
      paths:
        - path: /
          pathType: Prefix

db:
  type: postgresdb

postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    existingSecret: n8n-prod-postgresql

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password

# --- Configuration Browserless ---
browserless:
  enabled: true
  image:
    repository: browserless/chrome
    tag: latest
  service:
    port: 3000
  env:
    MAX_CONCURRENT_SESSIONS: "10"

# --- Sondes alignées sur le port 5678 ---
livenessProbe:
  httpGet:
    path: /healthz
    port: 5678
  initialDelaySeconds: 60
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /healthz
    port: 5678
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 3

main:
  count: 1
  command: ["/usr/local/bin/n8n"]
  extraEnvVars:
    N8N_COMMUNITY_PACKAGES_ENABLED: "true"
    N8N_SECURE_COOKIE: "false"
    BROWSERLESS_URL: "http://browserless:3000"
    PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"]
  args: ["worker"]
  extraEnvVars:
    BROWSERLESS_URL: "http://browserless:3000"
    PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"]
  url: http://n8n.localhost
  extraEnvVars:
    BROWSERLESS_URL: "http://browserless:3000"
    PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"

playwright-wrapper:
  enabled: false # Désactivé car Browserless prend le relais
  image:
    repository: n8n-playwright-local
    tag: 2.2.4-pw1.49.0-fix4-20260225-113301-nogit

existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2
