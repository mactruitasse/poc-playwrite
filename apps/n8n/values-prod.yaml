image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

db:
  type: postgresdb

postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    existingSecret: n8n-prod-postgresql

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password

# --- Configuration Browserless ---
browserless:
  enabled: true
  image:
    repository: browserless/chrome
    tag: latest
  service:
    port: 3000
  env:
    MAX_CONCURRENT_SESSIONS: "10"

# --- Configuration des Sondes (Port 8080) ---
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 45
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 15
  failureThreshold: 3

# --- Configuration des composants n8n ---
main:
  count: 1
  command: ["/usr/local/bin/n8n"]
  extraEnvVars:
    N8N_COMMUNITY_PACKAGES_ENABLED: "true"
    N8N_SECURE_COOKIE: "false"
    BROWSERLESS_URL: "http://browserless:3000"
    PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
    # Autorisations pour le nœud Code
    NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
    NODE_FUNCTION_ALLOW_BUILTIN: "*"

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"]
  args: ["worker"]
  extraEnvVars:
    BROWSERLESS_URL: "http://browserless:3000"
    PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
    NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
    NODE_FUNCTION_ALLOW_BUILTIN: "*"

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"]
  url: http://n8n.localhost
  extraEnvVars:
    BROWSERLESS_URL: "http://browserless:3000"
    PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
    NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
    NODE_FUNCTION_ALLOW_BUILTIN: "*"

# --- Playwright Wrapper (existant) ---
playwright-wrapper:
  enabled: true
  image:
    repository: n8n-playwright-local
    tag: 2.2.4-pw1.49.0-fix4-20260225-113301-nogit
  service:
    type: ClusterIP
    port: 8080
  env:
    apiTokenSecretName: playwright-wrapper-secret
    apiTokenSecretKey: API_TOKEN
    targetNamespace: n8n-prod
    playwrightPodLabelKey: app
    playwrightPodLabelValue: playwright-worker
    playwrightMcpPort: "8080"
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2
