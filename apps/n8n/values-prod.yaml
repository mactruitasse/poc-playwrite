image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

db:
  type: postgresdb

# --- CONFIGURATION INGRESS (Accès n8n.localhost) ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: n8n.localhost
      paths:
        - path: /
          pathType: Prefix

postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    existingSecret: n8n-prod-postgresql

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password

# --- CONFIGURATION BROWSERLESS (SESSIONS 20 MIN) ---
browserless:
  enabled: true
  image:
    repository: browserless/chrome
    tag: latest
  service:
    port: 3000
  env:
    MAX_CONCURRENT_SESSIONS: "10"
    # Timeout de session : 20 minutes
    TIMEOUT: "1200000"
    CONNECTION_TIMEOUT: "60000"
    KEEP_ALIVE: "true"
    WORKSPACE_DIR: "/home/browserless/workspace"

# --- VARIABLES D'ENVIRONNEMENT PARTAGÉES (STABILITÉ n8n) ---
commonEnv: &commonEnv
  NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
  NODE_FUNCTION_ALLOW_BUILTIN: "*"
  N8N_COMMUNITY_PACKAGES_ENABLED: "true"
  BROWSERLESS_URL: "http://browserless:3000"
  PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
  
  # Désactivation des Task Runners pour éviter les crashs WebSocket internes (v2.2.4)
  N8N_TASK_RUNNERS_ENABLED: "false"
  N8N_RUNNERS_MAX_OLD_SPACE_SIZE: "2048"
  N8N_TASK_RUNNERS_TIMEOUT: "120000"
  
  N8N_LOG_LEVEL: "debug"
  N8N_SECURE_COOKIE: "false"

# --- LIMITES DE RESSOURCES KUBERNETES ---
resources: &resources
  limits:
    memory: "4Gi"
    cpu: "1000m"
  requests:
    memory: "2Gi"
    cpu: "500m"

main:
  count: 1
  command: ["/usr/local/bin/n8n"]
  extraEnvVars: *commonEnv
  resources: *resources

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"]
  args: ["worker"]
  extraEnvVars: *commonEnv
  resources: *resources

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"]
  url: http://n8n.localhost
  extraEnvVars: *commonEnv
  resources:
    limits:
      memory: "2Gi"
    requests:
      memory: "512Mi"

# --- PLAYWRIGHT WRAPPER (SERVEUR MCP FASTAPI) ---
playwright-wrapper:
  enabled: true
  image:
    # On utilise l'image que tu as buildée et chargée dans Kind
    repository: playwright-wrapper 
    tag: v1
    pullPolicy: IfNotPresent 
  service:
    type: ClusterIP
    port: 8080
  env:
    # URL pour le nouveau script Python (utilise ws:// pour le CDP de Playwright)
    BROWSERLESS_URL: "ws://browserless:3000"
    LOG_LEVEL: "INFO"
  ingress:
    enabled: true
    annotations:
      # Désactive le buffering pour le flux SSE (Server-Sent Events) du MCP
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"

existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2
