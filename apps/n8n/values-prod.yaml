image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

db:
  type: postgresdb

# --- Configuration INGRESS (Accès n8n.localhost) ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: n8n.localhost
      paths:
        - path: /
          pathType: Prefix

postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: n8n-local-password
    existingSecret: n8n-prod-postgresql

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password

# --- Configuration Browserless ---
browserless:
  enabled: true
  image:
    repository: browserless/chrome
    tag: latest
  service:
    port: 3000
  env:
    MAX_CONCURRENT_SESSIONS: "10"

# --- Variables d'environnement partagées (DEBUG + MÉMOIRE) ---
commonEnv: &commonEnv
  # Autorisations JS
  NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
  NODE_FUNCTION_ALLOW_BUILTIN: "*"
  N8N_COMMUNITY_PACKAGES_ENABLED: "true"
  
  # Réseau interne
  BROWSERLESS_URL: "http://browserless:3000"
  PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
  
  # --- FIX STABILITÉ ---
  # On désactive le runner externe qui cause les erreurs WebSocket
  N8N_TASK_RUNNERS_ENABLED: "false"
  # On booste la RAM du processus principal à 2Go
  N8N_RUNNERS_MAX_OLD_SPACE_SIZE: "2048"
  
  # --- LOGS VERBEUX ---
  N8N_LOG_LEVEL: "debug"
  N8N_LOG_OUTPUT: "console"
  
  N8N_SECURE_COOKIE: "false"

# --- LIMITES DE RESSOURCES KUBERNETES ---
resources: &resources
  limits:
    memory: "4Gi" # On laisse 4Go au Pod pour éviter que Docker ne le tue
    cpu: "1000m"
  requests:
    memory: "2Gi"
    cpu: "500m"

main:
  count: 1
  command: ["/usr/local/bin/n8n"]
  extraEnvVars: *commonEnv
  resources: *resources

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"]
  args: ["worker"]
  extraEnvVars: *commonEnv
  resources: *resources

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"]
  url: http://n8n.localhost
  extraEnvVars: *commonEnv
  resources: *resources

# --- Playwright Wrapper (MCP) ---
playwright-wrapper:
  enabled: true
  image:
    repository: n8n-playwright-local
    tag: 2.2.4-pw1.49.0-fix4-20260225-113301-nogit
  service:
    port: 8080
  env:
    apiTokenSecretName: playwright-wrapper-secret
    apiTokenSecretKey: API_TOKEN
    targetNamespace: n8n-prod
  ingress:
    enabled: true

existingEncryptionKeySecret: n8n-prod-encryption-key-secret-v2
