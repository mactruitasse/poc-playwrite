image:
  repository: n8n-playwright-local
  tag: 2.2.4-pw1.49.0-fix5
  pullPolicy: IfNotPresent

config:
  database:
    type: postgresdb

# --- CONFIGURATION SERVICE (Fix Duplicate http) ---
service:
  type: ClusterIP
  port: 5678
  # On ne définit pas explicitement 'name: http' ici pour laisser le chart
  # gérer son nom par défaut sans doublon.

# --- CONFIGURATION INGRESS ---
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: n8n.localhost
      paths:
        - path: /
          pathType: Prefix

# --- INFRASTRUCTURE ---
postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    existingSecret: "n8n-prod-postgresql"
    secretKeys:
      userPasswordKey: "password"
      adminPasswordKey: "postgres-password"

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: redis-local-password 

# --- CONFIGURATION BROWSERLESS ---
browserless:
  enabled: true
  image:
    repository: browserless/chrome
    tag: 1.61-puppeteer
    pullPolicy: IfNotPresent 
  service:
    port: 3000
  env:
    MAX_CONCURRENT_SESSIONS: "10"
    TIMEOUT: "1200000"
    CONNECTION_TIMEOUT: "60000"
    KEEP_ALIVE: "true"
    WORKSPACE_DIR: "/home/browserless/workspace"

# --- VARIABLES D'ENVIRONNEMENT ---
commonEnv: &commonEnv
  NODE_FUNCTION_ALLOW_EXTERNAL: "playwright-core"
  NODE_FUNCTION_ALLOW_BUILTIN: "*"
  N8N_COMMUNITY_PACKAGES_ENABLED: "true"
  BROWSERLESS_URL: "http://browserless:3000"
  PLAYWRIGHT_SERVICE_URL: "ws://browserless:3000"
  N8N_TASK_RUNNERS_ENABLED: "false"
  N8N_RUNNERS_MAX_OLD_SPACE_SIZE: "2048"
  N8N_TASK_RUNNERS_TIMEOUT: "120000"
  N8N_LOG_LEVEL: "debug"
  N8N_SECURE_COOKIE: "false"

resources: &resources
  limits: { memory: "4Gi", cpu: "1000m" }
  requests: { memory: "2Gi", cpu: "500m" }

main:
  count: 1
  command: ["/usr/local/bin/n8n"]
  extraEnvVars: *commonEnv
  resources: *resources

worker:
  mode: queue
  count: 1
  concurrency: 5
  command: ["/usr/local/bin/n8n"]
  args: ["worker"]
  extraEnvVars: *commonEnv
  resources: *resources

webhook:
  mode: queue
  count: 1
  command: ["/usr/local/bin/n8n"]
  url: http://n8n.localhost
  extraEnvVars: *commonEnv
  resources:
    limits: { memory: "2Gi" }
    requests: { memory: "512Mi" }

# --- PLAYWRIGHT WRAPPER ---
playwright-wrapper:
  enabled: true
  image:
    repository: playwright-wrapper
    tag: v1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    # FIX: On nomme explicitement ce port pour éviter qu'il s'appelle "http" par défaut
    name: mcp-port 
  env:
    BROWSERLESS_URL: "ws://browserless:3000"
    LOG_LEVEL: "INFO"

existingEncryptionKeySecret: "n8n-prod-encryption-key-secret-v2"
