apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-browserless
  namespace: n8n-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-browserless
  template:
    metadata:
      labels:
        app: mcp-browserless
    spec:
      containers:
      - name: mcp-server
        image: npx-mcp-playwright:latest # Image contenant le serveur MCP Playwright
        command: ["npx", "-y", "@modelcontextprotocol/server-playwright"]
        env:
        - name: BROWSERLESS_URL
          value: "http://browserless:3000"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-browserless
  namespace: n8n-prod
spec:
  selector:
    app: mcp-browserless
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
